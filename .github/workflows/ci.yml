name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate HTML
    steps:
      - uses: actions/checkout@v4

      - name: Check src/index.html exists
        run: test -f src/index.html && echo "✅ index.html found"

      - name: Check file size (must be under 500kb)
        run: |
          SIZE=$(wc -c < src/index.html)
          echo "File size: $SIZE bytes"
          if [ $SIZE -gt 512000 ]; then
            echo "❌ File too large (>500kb)"
            exit 1
          fi
          echo "✅ File size OK"

      - name: Check for API key leaks
        run: |
          if grep -q "sk-ant-" src/index.html; then
            echo "❌ Possible API key found in source!"
            exit 1
          fi
          echo "✅ No API keys found"
